<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>E-C connect</title>
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
    }
    .logo {
      width: 24px;
      height: 24px;
      margin-right: 10px;
    }
    h2 {
      margin: 0;
      font-size: 16px;
    }
    .status {
      font-size: 12px;
      color: #666;
      margin-bottom: 15px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #0078d4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover {
      background-color: #005a9e;
    }
    button:disabled {
      background-color: #ccc;
    }
    .footer {
      margin-top: 15px;
      text-align: center;
    }
    .footer a {
      font-size: 12px;
      color: #0078d4;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" class="logo" alt="logo">
    <h2 id="i18n-title">E-C connect</h2>
  </div>
  <div id="status" class="status"></div>
  <button id="syncBtn"></button>
  <div class="footer">
    <a href="#" id="openOptions"></a>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
